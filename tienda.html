<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100vh&quot;}}">
class Component extends DCLogic {
  state = { 
    cart: [],
    currentLocation: "Estado 23, Santiago, Chile",
    stock: {
      polera: 15,
      taza: 20,
      mug: 18,
      gorra: 12,
      figuras: 25,
      poleron: 8,
      vasos: 30
    }
  };

  getStock = (product) => {
    const s = this.state.stock[product] || 0;
    return s > 0 ? s : 'AGOTADO';
  };

  addToCart = (e) => {
    const product = e.target.getAttribute('data-product');
    if (this.state.stock[product] > 0) {
      alert(`✓ ${product.toUpperCase()} agregado al carrito!`);
    } else {
      alert('Producto agotado');
    }
  };

  selectLocation = (e) => {
    const location = e.target.closest('div').querySelector('p').textContent;
    this.setState({ currentLocation: location });
    this.updateMap(location);
  };

  scrollToMap = () => {
    const mapSection = document.querySelector('[data-story-grid]');
    if (mapSection) {
      mapSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  updateMap = (location) => {
    const mapEmbed = document.getElementById('locationMap');
    if (!mapEmbed) return;

    let embedUrl = '';
    if (location.includes('Estado 23')) {
      embedUrl = 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3329.7208385934847!2d-70.66381!3d-33.43729!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9665320f3e5c5555%3A0x1234567890ab!2sEstado%2023%2C%20Santiago%2C%20Chile!5e0!3m2!1ses!2scl!4v1719100000000';
    } else if (location.includes('Huerfanos')) {
      embedUrl = 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3329.6854651!2d-70.6387!3d-33.4398!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9665316e!2sHu%C3%A9rfanos%20859%2C%20Santiago!5e0!3m2!1ses!2scl!4v1719100000000';
    }
    mapEmbed.src = embedUrl;
  };

  renderVals() {
    return {
      getStock: this.getStock,
      addToCart: this.addToCart,
      selectLocation: this.selectLocation,
      scrollToMap: this.scrollToMap,
      cartCount: this.state.cart.length || 0,
      currentLocation: this.state.currentLocation
    };
  }
}
</script>
